<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Movie ✦ tips & stuff</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f5f2eb;--surface:#fffdf8;
      --border:rgba(60,50,30,0.12);--border-strong:rgba(60,50,30,0.22);
      --text:#1a1612;--muted:#7a7060;--accent:#c8602a;
      --owner-bg:#1a1612;--owner-txt:#f0c060;
      --admin-bg:#2a1a4a;--admin-txt:#c090ff;
      --mod-bg:#0a2a1a;--mod-txt:#60d090;
    }
    html{font-size:16px}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");background-size:200px 200px}
    .topnav{position:sticky;top:0;z-index:30;background:var(--text);display:flex;align-items:center;padding:0 1.5rem;height:52px;gap:8px;flex-shrink:0}
    .topnav-logo{font-family:'Instrument Serif',serif;font-size:1.15rem;color:#fff;text-decoration:none;white-space:nowrap;flex-shrink:0;margin-right:6px}
    .topnav-logo em{font-style:italic;color:var(--accent)}
    .topnav-links{display:flex;align-items:center;gap:2px;flex:1;overflow:hidden}
    .topnav-link{font-size:0.78rem;color:rgba(255,255,255,0.55);text-decoration:none;padding:5px 9px;border-radius:6px;transition:all 0.13s;white-space:nowrap}
    .topnav-link:hover{color:#fff;background:rgba(255,255,255,0.08)}
    .topnav-link.active{color:#fff;background:rgba(255,255,255,0.12)}
    .topnav-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .rank-badge{font-size:0.67rem;font-weight:500;letter-spacing:0.04em;padding:3px 9px;border-radius:99px;text-transform:uppercase;white-space:nowrap}
    .rank-owner{background:var(--owner-bg);color:var(--owner-txt)}
    .rank-admin{background:var(--admin-bg);color:var(--admin-txt)}
    .rank-mod{background:var(--mod-bg);color:var(--mod-txt)}
    .rank-public{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7)}
    .topnav-btn{font-size:0.78rem;padding:5px 11px;border-radius:6px;border:1px solid rgba(255,255,255,0.18);background:transparent;color:rgba(255,255,255,0.75);cursor:pointer;transition:all 0.13s;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;font-family:'DM Sans',sans-serif}
    .topnav-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
    .page-wrap{position:relative;z-index:1;flex:1;width:100%;max-width:900px;margin:0 auto;padding:2rem 1.5rem 5rem}
    .movie-hero{display:grid;grid-template-columns:240px 1fr;gap:1.75rem;margin-bottom:2rem}
    .movie-poster{width:100%;aspect-ratio:2/3;border-radius:14px;background:linear-gradient(135deg,#2a1a0a,#1a1612);border:1px solid var(--border-strong);overflow:hidden;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.25);font-size:2.5rem}
    .movie-poster img{width:100%;height:100%;object-fit:cover;display:block}
    .movie-heading-wrap{display:flex;flex-direction:column;justify-content:center;gap:10px}
    .movie-status-badge{display:inline-flex;align-items:center;gap:5px;font-size:0.7rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;padding:4px 11px;border-radius:99px;background:var(--accent);color:#fff;width:fit-content}
    .movie-title{font-family:'Instrument Serif',serif;font-size:clamp(2rem,5vw,3rem);line-height:1.05;letter-spacing:-0.02em}
    .movie-tagline{font-size:1rem;color:var(--muted);font-style:italic;line-height:1.4}
    .movie-progress-wrap{display:flex;flex-direction:column;gap:5px;margin-top:6px;max-width:280px}
    .movie-progress-label{font-size:0.72rem;color:var(--muted);display:flex;justify-content:space-between}
    .movie-progress-track{height:7px;border-radius:99px;background:var(--border);overflow:hidden}
    .movie-progress-fill{height:100%;background:var(--accent);border-radius:99px;transition:width 0.4s ease}
    .movie-section{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1.5rem}
    .movie-section-title{font-size:0.8rem;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:0.85rem;display:flex;align-items:center;gap:7px}
    .movie-synopsis{font-size:0.95rem;line-height:1.75;white-space:pre-wrap}
    .movie-update-text{font-size:0.92rem;line-height:1.7;white-space:pre-wrap;color:var(--text)}
    .movie-update-date{font-size:0.72rem;color:var(--muted);margin-top:0.75rem}
    .movie-video-wrap{position:relative;width:100%;padding-top:56.25%;border-radius:10px;overflow:hidden;background:#000}
    .movie-video-wrap iframe,.movie-video-wrap video{position:absolute;inset:0;width:100%;height:100%;border:none}
    .movie-video-empty{position:relative;width:100%;padding-top:56.25%;border-radius:10px;background:linear-gradient(135deg,#2a1a0a,#1a1612);display:flex;align-items:center;justify-content:center}
    .movie-video-empty-inner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;color:rgba(255,255,255,0.4);font-size:0.85rem;text-align:center;padding:1rem}
    .movie-empty-state{text-align:center;padding:4rem 1.5rem;color:var(--muted)}
    .movie-empty-state h2{font-family:'Instrument Serif',serif;font-size:1.6rem;color:var(--text);margin-bottom:0.5rem;font-style:italic}
    .movie-empty-state p{font-size:0.9rem;line-height:1.6;max-width:380px;margin:0 auto}
    .movie-empty-state .me-icon{font-size:2.5rem;margin-bottom:1rem;opacity:0.5}
    .mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:40;background:var(--text);align-items:center;justify-content:space-around;border-top:1px solid rgba(255,255,255,0.08);height:56px}
    .mob-btn{flex:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.45);font-family:'DM Sans',sans-serif;font-size:0.55rem;position:relative;white-space:nowrap;text-decoration:none;min-width:0}
    .mob-btn .mi{font-size:1.05rem;line-height:1}
    .mob-btn.active{color:#fff}
    .mob-btn.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--accent);border-radius:2px 2px 0 0}
    .site-footer{margin-top:2rem;text-align:center;font-size:0.75rem;color:var(--muted);padding-bottom:2rem}
    @media(max-width:700px){
      .page-wrap{padding:1.5rem 1rem 5.5rem}
      .topnav-links{display:none}
      .mobile-nav{display:flex}
      .movie-hero{grid-template-columns:1fr;text-align:center}
      .movie-poster{max-width:200px;margin:0 auto}
      .movie-heading-wrap{align-items:center}
      .movie-progress-wrap{margin:6px auto 0}
    }
  </style>
</head>
<body>
<script>
(function(){
  var r=localStorage.getItem('rank');
  if(!r||r==='null'||r==='undefined'){window.location.replace('login.html');}
  var bg=localStorage.getItem('user_bg');
  var ac=localStorage.getItem('user_accent');
  if(bg){document.documentElement.style.setProperty('--bg',bg);}
  if(ac){document.documentElement.style.setProperty('--accent',ac);}
})();
</script>
<header class="topnav">
  <a href="index.html" class="topnav-logo">tips <em>&</em> stuff</a>
  <div class="topnav-links">
    <a href="index.html"       class="topnav-link">📋 Tips</a>
    <a href="ranks.html"       class="topnav-link">🏅 Ranks</a>
    <a href="rules.html"       class="topnav-link">📜 Rules</a>
    <a href="banlist.html"     class="topnav-link">🚫 Bans</a>
    <a href="news.html"        class="topnav-link">📰 News</a>
    <a href="games.html"       class="topnav-link">🎮 Games</a>
    <a href="leaderboard.html" class="topnav-link">🏆 Leaderboard</a>
    <a href="movie.html"       class="topnav-link active">🎬 Movie</a>
    <a href="version.html"     class="topnav-link">🔖 Version</a>
    <a href="donate.html"      class="topnav-link">💛 Donate</a>
  </div>
  <div class="topnav-right">
    <span id="rank-display" class="rank-badge rank-public">…</span>
    <a href="index.html" class="topnav-btn">← Back</a>
  </div>
</header>
<div class="page-wrap">
  <div id="movie-content">
    <div class="movie-empty-state">
      <div class="me-icon">🎬</div>
      <h2>Loading…</h2>
      <p>Fetching the latest from the production office.</p>
    </div>
  </div>
  <div class="site-footer"><p>tips &amp; stuff — shared with friends ✦</p></div>
</div>
<nav class="mobile-nav">
  <a href="index.html" class="mob-btn"><span class="mi">📋</span>Tips</a>
  <a href="ranks.html" class="mob-btn"><span class="mi">🏅</span>Ranks</a>
  <a href="news.html" class="mob-btn"><span class="mi">📰</span>News</a>
  <a href="leaderboard.html" class="mob-btn"><span class="mi">🏆</span>Board</a>
  <a href="movie.html" class="mob-btn active"><span class="mi">🎬</span>Movie</a>
  <a href="donate.html" class="mob-btn"><span class="mi">💛</span>Donate</a>
</nav>
<script>
const BIN_ID='6a25d3bcf5f4af5e29c7e9a1';
const API_KEY='$2a$10$g2w/Ji/OAOdsFUPYJt3SNOrEKqe74g.CKnZ2s7tIJpVFpezCM3UjO';
const BIN_URL='https://api.jsonbin.io/v3/b/'+BIN_ID;
let rank=localStorage.getItem('rank')||'public';
let username=localStorage.getItem('username')||'';

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function applyRankBadge(){
  const icons={owner:'👑',admin:'🛡️',mod:'🔧',public:'👤'};
  const names={owner:'Owner',admin:'Admin',mod:'Mod',public:'Public'};
  const icon=icons[rank]||'👤';
  const label=username?icon+' '+username:icon+' '+names[rank];
  const cls={owner:'rank-owner',admin:'rank-admin',mod:'rank-mod',public:'rank-public'};
  const rd=document.getElementById('rank-display');
  rd.textContent=label;rd.className='rank-badge '+(cls[rank]||'rank-public');
}

const STATUS_LABELS={
  planning:{label:'📝 Planning'},
  writing:{label:'✍️ Writing the script'},
  filming:{label:'🎥 Filming'},
  editing:{label:'✂️ Editing'},
  post:{label:'🎞️ Post-Production'},
  released:{label:'🍿 Released'},
};

function toYouTubeEmbed(url){
  if(!url)return '';
  const m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([A-Za-z0-9_-]{6,})/);
  if(m)return 'https://www.youtube.com/embed/'+m[1];
  const v=url.match(/vimeo\.com\/(\d+)/);
  if(v)return 'https://player.vimeo.com/video/'+v[1];
  return '';
}

function renderVideo(url){
  if(!url){
    return `<div class="movie-video-empty"><div class="movie-video-empty-inner">🎬 No trailer added yet — check back soon!</div></div>`;
  }
  const embed=toYouTubeEmbed(url);
  if(embed)return `<div class="movie-video-wrap"><iframe src="${esc(embed)}" allowfullscreen></iframe></div>`;
  if(/\.(mp4|webm|ogg)$/i.test(url))return `<div class="movie-video-wrap"><video src="${esc(url)}" controls></video></div>`;
  return `<div class="movie-video-empty"><div class="movie-video-empty-inner">▶ <a href="${esc(url)}" target="_blank" style="color:#fff">Open video link</a></div></div>`;
}

function renderMovie(movie){
  const host=document.getElementById('movie-content');
  if(!movie || !movie.title){
    host.innerHTML=`<div class="movie-empty-state">
      <div class="me-icon">🎬</div>
      <h2>Nothing to show yet</h2>
      <p>The Owner hasn't published any movie details. Once they fill in the Movie Page settings, it'll show up right here.</p>
    </div>`;
    return;
  }
  const statusInfo=STATUS_LABELS[movie.status]||STATUS_LABELS.planning;
  const progress=Math.max(0,Math.min(100,parseInt(movie.progress)||0));
  const hasProgress=movie.progress!==undefined && movie.progress!==null && movie.progress!=='';
  const posterInner=movie.poster?`<img src="${esc(movie.poster)}" alt="${esc(movie.title)} poster"/>`:'🎬';
  const updatedDate=movie.updatedAt?new Date(movie.updatedAt).toLocaleDateString([],{month:'long',day:'numeric',year:'numeric'}):'';

  host.innerHTML=`
    <div class="movie-hero">
      <div class="movie-poster">${posterInner}</div>
      <div class="movie-heading-wrap">
        <span class="movie-status-badge">${statusInfo.label}</span>
        <h1 class="movie-title">${esc(movie.title)}</h1>
        ${movie.tagline?`<p class="movie-tagline">${esc(movie.tagline)}</p>`:''}
        ${hasProgress?`<div class="movie-progress-wrap">
          <div class="movie-progress-label"><span>Progress</span><span>${progress}%</span></div>
          <div class="movie-progress-track"><div class="movie-progress-fill" style="width:${progress}%"></div></div>
        </div>`:''}
      </div>
    </div>

    <div class="movie-section">
      <div class="movie-section-title">🎞️ Trailer</div>
      ${renderVideo(movie.video)}
    </div>

    ${movie.synopsis?`<div class="movie-section">
      <div class="movie-section-title">📖 Synopsis</div>
      <p class="movie-synopsis">${esc(movie.synopsis)}</p>
    </div>`:''}

    ${movie.update?`<div class="movie-section">
      <div class="movie-section-title">🎬 Director's Update</div>
      <p class="movie-update-text">${esc(movie.update)}</p>
      ${updatedDate?`<p class="movie-update-date">Last updated ${updatedDate}</p>`:''}
    </div>`:''}
  `;
}

async function loadMovie(){
  applyRankBadge();
  try{
    const res=await fetch(BIN_URL+'/latest',{headers:{'X-Master-Key':API_KEY,'X-Bin-Meta':'false'}});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const raw=await res.json();
    const data=raw.record!==undefined?raw.record:raw;
    renderMovie(data.movie||{});
  }catch(e){
    document.getElementById('movie-content').innerHTML=`<div class="movie-empty-state">
      <div class="me-icon">⚠️</div>
      <h2>Couldn't load this page</h2>
      <p>${esc(e.message)} — try refreshing.</p>
    </div>`;
  }
}
loadMovie();
</script>
</body>
