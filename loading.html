<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>tips & stuff ✦</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f2eb;
      --text: #1a1612;
      --accent: #c8602a;
      --muted: #7a7060;
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* noise texture */
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }

    .loader {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 28px;
    }

    /* logo */
    .logo {
      font-family: 'Instrument Serif', serif;
      font-size: clamp(2.6rem, 8vw, 4.5rem);
      line-height: 1; letter-spacing: -0.02em;
      color: var(--text);
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.7s ease 0.2s forwards;
    }
    .logo em { font-style: italic; color: var(--accent); }

    /* tagline */
    .tagline {
      font-size: clamp(0.7rem, 2vw, 0.82rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      animation: fadeUp 0.6s ease 0.55s forwards;
    }

    /* progress bar */
    .bar-wrap {
      width: 160px; height: 2px;
      background: rgba(60,50,30,0.12);
      border-radius: 99px;
      overflow: hidden;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.7s forwards;
    }
    .bar-fill {
      height: 100%;
      width: 0%;
      background: var(--accent);
      border-radius: 99px;
      animation: fill 1.6s cubic-bezier(0.4, 0, 0.2, 1) 0.85s forwards;
    }

    /* dot cluster decoration */
    .dots {
      display: flex; gap: 7px;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.6s forwards;
    }
    .dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.2s ease infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    /* page exit */
    .loader.exit {
      animation: exitFade 0.5s ease forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fill {
      to { width: 100%; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50%       { opacity: 1;   transform: scale(1.2); }
    }
    @keyframes exitFade {
      to { opacity: 0; transform: scale(0.97); }
    }
  </style>
</head>
<body>
  <div class="loader" id="loader">
    <div class="logo">tips <em>&</em> stuff</div>
    <div class="tagline">a shared board for tips & gems ✦</div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <div class="bar-wrap">
      <div class="bar-fill"></div>
    </div>
  </div>

  <script>
    // Skip loading screen if already visited this session
    if (sessionStorage.getItem('loaded')) {
      // Already seen loading — skip straight to where they were
      const dest = sessionStorage.getItem('rank') ? 'index.html' : 'welcome.html';
      window.location.replace(dest);
    }

    // After bar fills (~2.5s total), fade out and go to welcome
    setTimeout(() => {
      document.getElementById('loader').classList.add('exit');
      setTimeout(() => {
        sessionStorage.setItem('loaded', '1');
        window.location.replace('welcome.html');
      }, 500);
    }, 2500);
  </script>
</body>
</html>
