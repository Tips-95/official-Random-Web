<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🏆 Leaderboard ✦ tips & stuff</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f5f2eb;--surface:#fffdf8;
      --border:rgba(60,50,30,0.12);--border-strong:rgba(60,50,30,0.22);
      --text:#1a1612;--muted:#7a7060;--accent:#c8602a;
      --gold:#b8860b;--silver:#6a6a7a;--bronze:#8a5a2a;
      --owner-bg:#1a1612;--owner-txt:#f0c060;
      --admin-bg:#2a1a4a;--admin-txt:#c090ff;
      --mod-bg:#0a2a1a;--mod-txt:#60d090;
    }
    html{font-size:16px}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");background-size:200px 200px}

    /* NAV */
    .topnav{position:sticky;top:0;z-index:30;background:var(--text);display:flex;align-items:center;padding:0 1.5rem;height:52px;gap:8px;flex-shrink:0}
    .topnav-logo{font-family:'Instrument Serif',serif;font-size:1.15rem;color:#fff;text-decoration:none;white-space:nowrap;flex-shrink:0;margin-right:6px}
    .topnav-logo em{font-style:italic;color:var(--accent)}
    .topnav-links{display:flex;align-items:center;gap:2px;flex:1;overflow:hidden}
    .topnav-link{font-size:0.78rem;color:rgba(255,255,255,0.55);text-decoration:none;padding:5px 9px;border-radius:6px;transition:all 0.13s;white-space:nowrap}
    .topnav-link:hover{color:#fff;background:rgba(255,255,255,0.08)}
    .topnav-link.active{color:#fff;background:rgba(255,255,255,0.12)}
    .topnav-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .topnav-btn{font-size:0.78rem;padding:5px 11px;border-radius:6px;border:1px solid rgba(255,255,255,0.18);background:transparent;color:rgba(255,255,255,0.75);cursor:pointer;transition:all 0.13s;white-space:nowrap;text-decoration:none;display:inline-flex;align-items:center;font-family:'DM Sans',sans-serif}
    .topnav-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
    .rank-badge{font-size:0.67rem;font-weight:500;letter-spacing:0.04em;padding:3px 9px;border-radius:99px;text-transform:uppercase;white-space:nowrap}
    .rank-public{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7)}
    .rank-owner{background:var(--owner-bg);color:var(--owner-txt)}
    .rank-admin{background:var(--admin-bg);color:var(--admin-txt)}
    .rank-mod{background:var(--mod-bg);color:var(--mod-txt)}

    /* LANG SWITCHER */
    .lang-switcher{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,0.07);border-radius:8px;padding:3px}
    .lang-btn{background:none;border:none;font-size:1rem;cursor:pointer;padding:3px 5px;border-radius:5px;transition:background 0.13s;line-height:1}
    .lang-btn:hover{background:rgba(255,255,255,0.12)}
    .lang-btn.active{background:rgba(255,255,255,0.2)}

    /* PAGE */
    .page{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:2rem 1.5rem 5rem;width:100%}

    /* HERO */
    .lb-hero{text-align:center;padding:2rem 0 1.5rem}
    .lb-hero h1{font-family:'Instrument Serif',serif;font-size:clamp(2rem,5vw,3.2rem);letter-spacing:-0.02em}
    .lb-hero h1 em{font-style:italic;color:var(--accent)}
    .lb-hero p{color:var(--muted);font-size:0.875rem;margin-top:0.4rem}

    /* MY CARD */
    .my-card{background:var(--surface);border:1.5px solid var(--accent);border-radius:14px;padding:1.2rem 1.5rem;margin-bottom:1.75rem;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
    .my-card-left{flex:1;min-width:160px}
    .my-card-name{font-size:1rem;font-weight:600}
    .my-card-sub{font-size:0.78rem;color:var(--muted);margin-top:2px}
    .my-timer{font-family:'DM Mono',monospace;font-size:2rem;font-weight:500;color:var(--accent);letter-spacing:0.04em}
    .my-timer-label{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px}
    .my-card-rank{font-family:'DM Mono',monospace;font-size:0.8rem;color:var(--muted);text-align:right}
    .my-card-rank strong{display:block;font-size:1.4rem;color:var(--text)}

    /* TABS */
    .lb-tabs{display:flex;gap:6px;margin-bottom:1.25rem;flex-wrap:wrap}
    .lb-tab{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;font-family:'DM Sans',sans-serif;font-size:0.82rem;color:var(--muted);cursor:pointer;transition:all 0.13s}
    .lb-tab:hover{background:var(--surface);color:var(--text)}
    .lb-tab.active{background:var(--text);color:#fff;border-color:var(--text)}

    /* TABLE */
    .lb-wrap{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
    .lb-header{padding:1rem 1.25rem;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
    .lb-header-title{font-size:0.9rem;font-weight:600;display:flex;align-items:center;gap:6px}
    .lb-count{font-size:0.72rem;color:var(--muted)}
    table{width:100%;border-collapse:collapse}
    thead th{font-size:0.7rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;padding:10px 14px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
    tbody tr{border-bottom:1px solid var(--border);transition:background 0.12s}
    tbody tr:last-child{border-bottom:none}
    tbody tr:hover td{background:rgba(200,96,42,0.03)}
    tbody tr.is-me td{background:rgba(200,96,42,0.06)}
    td{padding:12px 14px;font-size:0.875rem;vertical-align:middle}
    .td-rank{font-family:'DM Mono',monospace;font-size:0.9rem;font-weight:700;width:44px}
    .gold{color:var(--gold)}.silver{color:var(--silver)}.bronze{color:var(--bronze)}
    .td-medal{font-size:1.1rem;width:32px}
    .td-name{font-weight:500}
    .td-name .you-badge{font-size:0.6rem;background:var(--accent);color:#fff;padding:1px 5px;border-radius:99px;margin-left:5px;vertical-align:middle}
    .td-time{font-family:'DM Mono',monospace;font-size:0.82rem;color:var(--accent)}
    .td-sessions{font-size:0.78rem;color:var(--muted)}
    .td-last{font-size:0.72rem;color:var(--muted)}
    .rank-pip{display:inline-block;font-size:0.6rem;padding:2px 6px;border-radius:99px;font-weight:500;vertical-align:middle;margin-left:4px}

    .lb-empty{text-align:center;padding:3rem;color:var(--muted);font-size:0.875rem}
    .lb-loading{text-align:center;padding:2.5rem;color:var(--muted);font-family:'DM Mono',monospace;font-size:0.8rem;letter-spacing:0.06em}

    /* ADMIN CONTROLS */
    .admin-strip{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:0.85rem 1.2rem;margin-bottom:1.25rem;display:none;align-items:center;gap:10px;flex-wrap:wrap;font-size:0.82rem}
    .admin-strip.show{display:flex}
    .admin-label{color:var(--muted);flex:1}
    .admin-btn{font-size:0.78rem;padding:5px 12px;border-radius:6px;border:1px solid var(--border-strong);background:transparent;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all 0.13s}
    .admin-btn:hover{background:#fce8ec;color:#c0392b;border-color:#fce8ec}
    .admin-btn.safe:hover{background:#e8f0e0;color:#2d7a2d;border-color:#e8f0e0}

    .site-footer{margin-top:2.5rem;text-align:center;font-size:0.75rem;color:var(--muted);padding-bottom:2rem}

    @media(max-width:640px){
      .topnav-links{display:none}
      .my-card{flex-direction:column;align-items:flex-start}
      .my-card-rank{text-align:left}
      td:nth-child(5),th:nth-child(5){display:none}
    }
  </style>
</head>
<body>

<!-- NAV -->
<header class="topnav">
  <a href="index.html" class="topnav-logo">tips <em>&</em> stuff</a>
  <div class="topnav-links">
    <a href="index.html"       class="topnav-link">📋 Tips</a>
    <a href="ranks.html"       class="topnav-link">🏅 Ranks</a>
    <a href="rules.html"       class="topnav-link">📜 Rules</a>
    <a href="banlist.html"     class="topnav-link">🚫 Bans</a>
    <a href="leaderboard.html" class="topnav-link active">🏆 Leaderboard</a>
    <a href="donate.html"      class="topnav-link">💛 Donate</a>
  </div>
  <div class="topnav-right">
    <!-- Language Switcher -->
    <div class="lang-switcher" id="lang-sw">
      <button class="lang-btn active" data-lang="en" onclick="setLang('en')" title="English">🇺🇸</button>
      <button class="lang-btn" data-lang="ko" onclick="setLang('ko')" title="Korean">🇰🇷</button>
      <button class="lang-btn" data-lang="es" onclick="setLang('es')" title="Spanish">🇪🇸</button>
      <button class="lang-btn" data-lang="de" onclick="setLang('de')" title="German">🇩🇪</button>
    </div>
    <span id="rank-display" class="rank-badge rank-public">Public</span>
    <a href="index.html" class="topnav-btn" id="back-btn">← Back</a>
  </div>
</header>

<div class="page">

  <!-- HERO -->
  <div class="lb-hero">
    <h1>🏆 <em id="t-title">Leaderboard</em></h1>
    <p id="t-subtitle">See who's spent the most time on tips & stuff</p>
  </div>

  <!-- MY CARD -->
  <div class="my-card" id="my-card" style="display:none">
    <div class="my-card-left">
      <div class="my-card-name" id="my-name">—</div>
      <div class="my-card-sub" id="t-your-session">Your current session</div>
    </div>
    <div style="text-align:center">
      <div class="my-timer" id="my-live-timer">00:00:00</div>
      <div class="my-timer-label" id="t-time-today">Time today</div>
    </div>
    <div class="my-card-rank">
      <div id="t-rank-label" style="font-size:0.72rem;color:var(--muted)">Your rank</div>
      <strong id="my-rank-num">#—</strong>
    </div>
  </div>

  <!-- ADMIN STRIP -->
  <div class="admin-strip" id="admin-strip">
    <span class="admin-label" id="t-admin-label">🛡️ Admin controls</span>
    <button class="admin-btn" onclick="resetMyTime()" id="t-reset-me">Reset my time</button>
    <button class="admin-btn" onclick="clearAllTimes()" id="t-clear-all">Clear all times</button>
  </div>

  <!-- TABS -->
  <div class="lb-tabs">
    <button class="lb-tab active" id="tab-time"     onclick="switchTab('time')"    id="t-tab-time">⏱ Time on Site</button>
    <button class="lb-tab"        id="tab-sessions" onclick="switchTab('sessions')" id="t-tab-sess">📅 Sessions</button>
  </div>

  <!-- TABLE -->
  <div class="lb-wrap">
    <div class="lb-header">
      <div class="lb-header-title">🏆 <span id="t-table-title">All-Time Rankings</span></div>
      <div class="lb-count" id="lb-count"></div>
    </div>
    <div id="lb-body"><div class="lb-loading" id="t-loading">loading…</div></div>
  </div>

  <div class="site-footer"><p>tips & stuff — shared with friends ✦</p></div>
</div>

<script>
// ── CONFIG ──
const BIN_ID  = '6a25d3bcf5f4af5e29c7e9a1';
const API_KEY = '$2a$10$g2w/Ji/OAOdsFUPYJt3SNOrEKqe74g.CKnZ2s7tIJpVFpezCM3UjO';
const BIN_URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

// ── TRANSLATIONS ──
const LANGS = {
  en: {
    title:'Leaderboard', subtitle:'See who\'s spent the most time on tips & stuff',
    yourSession:'Your current session', timeToday:'Time today', rankLabel:'Your rank',
    adminLabel:'🛡️ Admin controls', resetMe:'Reset my time', clearAll:'Clear all times',
    tabTime:'⏱ Time on Site', tabSess:'📅 Sessions', tableTitle:'All-Time Rankings',
    loading:'loading…', empty:'No data yet — be the first!',
    colRank:'Rank', colName:'Player', colTime:'Total Time', colSess:'Sessions', colLast:'Last Seen',
    you:'you', back:'← Back',
  },
  ko: {
    title:'리더보드', subtitle:'팁스 & 스터프에서 가장 오래 머문 사람을 확인하세요',
    yourSession:'현재 세션', timeToday:'오늘 시간', rankLabel:'내 순위',
    adminLabel:'🛡️ 관리자 메뉴', resetMe:'내 기록 초기화', clearAll:'전체 기록 초기화',
    tabTime:'⏱ 사이트 체류 시간', tabSess:'📅 세션 수', tableTitle:'전체 순위',
    loading:'불러오는 중…', empty:'아직 데이터가 없습니다!',
    colRank:'순위', colName:'플레이어', colTime:'총 시간', colSess:'세션', colLast:'마지막 방문',
    you:'나', back:'← 돌아가기',
  },
  es: {
    title:'Tabla de líderes', subtitle:'Mira quién ha pasado más tiempo en tips & stuff',
    yourSession:'Tu sesión actual', timeToday:'Tiempo hoy', rankLabel:'Tu posición',
    adminLabel:'🛡️ Controles de admin', resetMe:'Reiniciar mi tiempo', clearAll:'Borrar todo',
    tabTime:'⏱ Tiempo en el sitio', tabSess:'📅 Sesiones', tableTitle:'Clasificación general',
    loading:'cargando…', empty:'¡Sin datos todavía — sé el primero!',
    colRank:'Posición', colName:'Jugador', colTime:'Tiempo total', colSess:'Sesiones', colLast:'Última vez',
    you:'tú', back:'← Volver',
  },
  de: {
    title:'Rangliste', subtitle:'Sieh, wer die meiste Zeit auf tips & stuff verbracht hat',
    yourSession:'Aktuelle Sitzung', timeToday:'Zeit heute', rankLabel:'Dein Rang',
    adminLabel:'🛡️ Admin-Steuerung', resetMe:'Meine Zeit zurücksetzen', clearAll:'Alles löschen',
    tabTime:'⏱ Zeit auf der Seite', tabSess:'📅 Sitzungen', tableTitle:'Gesamtrangliste',
    loading:'Lade…', empty:'Noch keine Daten — sei der Erste!',
    colRank:'Rang', colName:'Spieler', colTime:'Gesamtzeit', colSess:'Sitzungen', colLast:'Zuletzt gesehen',
    you:'ich', back:'← Zurück',
  },
};

let lang = localStorage.getItem('lang') || 'en';
let T = LANGS[lang];

function setLang(l) {
  lang = l; T = LANGS[l];
  localStorage.setItem('lang', l);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === l));
  applyTranslations();
  renderTable();
}

function applyTranslations() {
  const s = (id, txt) => { const el = document.getElementById(id); if(el) el.textContent = txt; };
  s('t-title',        T.title);
  s('t-subtitle',     T.subtitle);
  s('t-your-session', T.yourSession);
  s('t-time-today',   T.timeToday);
  s('t-rank-label',   T.rankLabel);
  s('t-admin-label',  T.adminLabel);
  s('t-reset-me',     T.resetMe);
  s('t-clear-all',    T.clearAll);
  s('tab-time',       T.tabTime);
  s('tab-sessions',   T.tabSess);
  s('t-table-title',  T.tableTitle);
  s('t-loading',      T.loading);
  s('back-btn',       T.back);
  document.title = '🏆 ' + T.title + ' ✦ tips & stuff';
}

// ── STATE ──
const rank = sessionStorage.getItem('rank') || 'public';
const username = sessionStorage.getItem('username') || localStorage.getItem('chat_name') || '';
let db = {};
let leaderboard = []; // array of { id, name, totalMs, sessions, lastSeen }
let activeTab = 'time';
let sessionStartMs = Date.now();
let liveInterval = null;
let saveInterval = null;
let myEntry = null;

// ── INIT ──
const RANK_LABELS = {owner:'👑 Owner',admin:'🛡️ Admin',mod:'🔧 Mod'};
const RANK_CLASSES = {owner:'rank-owner',admin:'rank-admin',mod:'rank-mod',public:'rank-public'};
const isAdmin = rank === 'owner' || rank === 'admin';

window.addEventListener('DOMContentLoaded', () => {
  applyTranslations();
  setLang(lang);

  // Show rank badge
  const rd = document.getElementById('rank-display');
  const rankLabel = RANK_LABELS[rank] || (username ? '👤 '+username : 'Public');
  rd.textContent = rankLabel;
  rd.className = 'rank-badge ' + (RANK_CLASSES[rank] || 'rank-public');

  // Show admin controls
  if(isAdmin) document.getElementById('admin-strip').classList.add('show');

  // Show my card if logged in with username
  if(username) {
    document.getElementById('my-card').style.display = 'flex';
    document.getElementById('my-name').textContent = username;
  }

  loadData();
});

// ── DATA ──
async function loadData() {
  try {
    const res = await fetch(BIN_URL + '/latest', { headers: { 'X-Master-Key': API_KEY, 'X-Bin-Meta': 'false' } });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const raw = await res.json();
    const data = raw.record !== undefined ? raw.record : raw;
    db = data;
    leaderboard = Array.isArray(data.leaderboard) ? data.leaderboard : [];

    if(username) {
      // Find or create entry for this user
      myEntry = leaderboard.find(e => e.name.toLowerCase() === username.toLowerCase());
      if(!myEntry) {
        myEntry = { id: 'lb_' + Date.now(), name: username, totalMs: 0, sessions: 0, lastSeen: Date.now() };
        leaderboard.push(myEntry);
      }
      // Start a new session
      myEntry.sessions = (myEntry.sessions || 0) + 1;
      myEntry.lastSeen = Date.now();
      sessionStartMs = Date.now();

      // Live timer
      liveInterval = setInterval(updateLiveTimer, 1000);
      // Save time every 30 seconds
      saveInterval = setInterval(saveMyTime, 30000);
      // Save when leaving
      window.addEventListener('beforeunload', saveMyTime);
    }

    renderTable();
  } catch(e) {
    document.getElementById('lb-body').innerHTML =
      `<div class="lb-loading">⚠️ Could not load — ${e.message}</div>`;
  }
}

async function saveMyTime() {
  if(!myEntry || !username) return;
  const elapsed = Date.now() - sessionStartMs;
  myEntry.totalMs = (myEntry.totalMs || 0) + elapsed;
  myEntry.lastSeen = Date.now();
  sessionStartMs = Date.now(); // reset so we don't double-count
  db.leaderboard = leaderboard;
  try {
    await fetch(BIN_URL, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'X-Master-Key': API_KEY },
      body: JSON.stringify(db)
    });
  } catch(e) {}
  renderTable();
}

function updateLiveTimer() {
  const elapsed = Date.now() - sessionStartMs;
  const running = (myEntry ? myEntry.totalMs : 0) + elapsed;
  document.getElementById('my-live-timer').textContent = formatMs(running);

  // Update my rank
  const sorted = [...leaderboard].sort((a,b) => (b.totalMs||0)-(a.totalMs||0));
  const pos = sorted.findIndex(e => e.name.toLowerCase() === username.toLowerCase());
  document.getElementById('my-rank-num').textContent = pos >= 0 ? '#' + (pos+1) : '#—';
}

// ── RENDER ──
function switchTab(t) {
  activeTab = t;
  document.getElementById('tab-time').classList.toggle('active', t==='time');
  document.getElementById('tab-sessions').classList.toggle('active', t==='sessions');
  renderTable();
}

function renderTable() {
  const body = document.getElementById('lb-body');
  if(!leaderboard.length) {
    body.innerHTML = `<div class="lb-empty">${T.empty}</div>`;
    document.getElementById('lb-count').textContent = '';
    return;
  }

  // Sort
  const sorted = [...leaderboard].sort((a,b) =>
    activeTab === 'time'
      ? (b.totalMs||0) - (a.totalMs||0)
      : (b.sessions||0) - (a.sessions||0)
  );

  document.getElementById('lb-count').textContent = sorted.length + ' players';

  const medals = ['🥇','🥈','🥉'];
  const rankCls = ['gold','silver','bronze'];
  const isMe = name => username && name.toLowerCase() === username.toLowerCase();

  body.innerHTML = `
    <table>
      <thead>
        <tr>
          <th style="width:44px">${T.colRank}</th>
          <th style="width:32px"></th>
          <th>${T.colName}</th>
          <th>${T.colTime}</th>
          <th>${T.colSess}</th>
          <th>${T.colLast}</th>
        </tr>
      </thead>
      <tbody>
        ${sorted.map((e, i) => {
          const medal = i < 3 ? medals[i] : '';
          const rc    = i < 3 ? rankCls[i] : '';
          const me    = isMe(e.name);
          const rk    = sessionStorage.getItem('rank') || '';
          const pip   = RANK_LABELS[rk] && me
            ? `<span class="rank-pip ${RANK_CLASSES[rk]||''}">${RANK_LABELS[rk]}</span>`
            : '';
          const youBadge = me ? `<span class="you-badge">${T.you}</span>` : '';
          const last = e.lastSeen
            ? new Date(e.lastSeen).toLocaleDateString([], {month:'short',day:'numeric'})
            : '—';
          return `<tr class="${me ? 'is-me' : ''}">
            <td class="td-rank ${rc}">${i+1}</td>
            <td class="td-medal">${medal}</td>
            <td class="td-name">${esc(e.name)}${youBadge}${pip}</td>
            <td class="td-time">${formatMs(e.totalMs||0)}</td>
            <td class="td-sessions">${e.sessions||0}</td>
            <td class="td-last">${last}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>`;
}

// ── ADMIN ──
async function resetMyTime() {
  if(!username || !confirm('Reset your time to 0?')) return;
  myEntry = leaderboard.find(e => e.name.toLowerCase() === username.toLowerCase());
  if(myEntry) { myEntry.totalMs = 0; myEntry.sessions = 0; }
  sessionStartMs = Date.now();
  db.leaderboard = leaderboard;
  try { await fetch(BIN_URL, { method:'PUT', headers:{'Content-Type':'application/json','X-Master-Key':API_KEY}, body:JSON.stringify(db) }); }
  catch(e) {}
  renderTable();
}

async function clearAllTimes() {
  if(!confirm('Clear ALL leaderboard times? This cannot be undone.')) return;
  leaderboard = [];
  db.leaderboard = [];
  try { await fetch(BIN_URL, { method:'PUT', headers:{'Content-Type':'application/json','X-Master-Key':API_KEY}, body:JSON.stringify(db) }); }
  catch(e) {}
  renderTable();
}

// ── UTILS ──
function formatMs(ms) {
  if(!ms || ms < 0) return '00:00:00';
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const sec = s % 60;
  return [h, m, sec].map(v => String(v).padStart(2,'0')).join(':');
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
