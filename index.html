<body>
<main class="page">
  <header class="header">
    <h1 class="site-title">tips <em>&</em> stuff</h1>
    <p class="subtitle">a shared board for tips, tricks, and random gems ✦ add yours below</p>
    <hr class="divider" />
  </header>

  <div class="status-bar">
    <div class="status-dot loading" id="status-dot"></div>
    <span id="status-text">loading tips...</span>
  </div>

  <div class="add-form">
    <input type="text" id="tip-input"  placeholder="Drop a tip or random thought..." maxlength="280" />
    <input type="text" id="name-input" placeholder="Your name" maxlength="30" class="name-input" />
    <select id="tag-select">
      <option value="tip">💡 tip</option>
      <option value="food">🍜 food</option>
      <option value="life">✌️ life</option>
      <option value="tech">⚡ tech</option>
      <option value="random">🎲 random</option>
    </select>
    <button class="add-btn" id="add-btn" onclick="addTip()">+ Add</button>
    <button class="refresh-btn" onclick="loadTips()">↻ Refresh</button>
  </div>

  <div class="filter-bar" id="filter-bar"></div>
  <p class="count-label" id="count-label"></p>
  <div class="tips-grid" id="tips-grid">
    <div class="state-msg"><div class="icon">✦</div><p>loading tips...</p></div>
  </div>
  <footer class="site-footer"><p>tips & stuff — shared with friends ✦</p></footer>
</main>

<script>
  const BIN_ID  = '6a25d3bcf5f4af5e29c7e9a1';
  const API_KEY = '$2a$10$g2w/Ji/OAOdsFUPYJt3SNOrEKqe74g.CKnZ2s7tIJpVFpezCM3UjO';
  const BIN_URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

  const TAG_CONFIG = {
    tip:    { label: '💡 tip',    bg: 'var(--tag-tip-bg)',    color: 'var(--tag-tip-txt)',    accent: '#4a8a1a' },
    food:   { label: '🍜 food',   bg: 'var(--tag-food-bg)',   color: 'var(--tag-food-txt)',   accent: '#c8602a' },
    life:   { label: '✌️ life',   bg: 'var(--tag-life-bg)',   color: 'var(--tag-life-txt)',   accent: '#2a60c8' },
    tech:   { label: '⚡ tech',   bg: 'var(--tag-tech-bg)',   color: 'var(--tag-tech-txt)',   accent: '#7a2ac8' },
    random: { label: '🎲 random', bg: 'var(--tag-random-bg)', color: 'var(--tag-random-txt)', accent: '#c82a4a' },
  };

  let allTips = [];
  let activeFilter = 'all';

  const dot      = document.getElementById('status-dot');
  const statusTx = document.getElementById('status-text');
  const addBtn   = document.getElementById('add-btn');

  function setStatus(state, msg) {
    dot.className = 'status-dot ' + state;
    statusTx.textContent = msg;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Pull tips out of whatever shape JSONBin returns
  function extractTips(record) {
    if (Array.isArray(record)) return record;
    if (record && Array.isArray(record.tips)) return record.tips;
    return [];
  }

  async function loadTips() {
    setStatus('loading', 'loading tips...');
    try {
      const res = await fetch(BIN_URL + '/latest', {
        headers: {
          'X-Master-Key': API_KEY,
          'X-Bin-Meta': 'false'
        }
      });
      if (!res.ok) {
        const txt = await res.text();
        throw new Error('HTTP ' + res.status + ': ' + txt);
      }
      const data = await res.json();
      // JSONBin wraps in { record: ... } — handle both wrapped and raw
      const record = data.record !== undefined ? data.record : data;
      allTips = extractTips(record);
      setStatus('ok', 'loaded ✓ — hit ↻ refresh to see new tips from others');
      render();
    } catch(e) {
      console.error('loadTips error:', e);
      setStatus('error', 'could not load — check console (F12) for details');
      document.getElementById('tips-grid').innerHTML =
        `<div class="state-msg"><div class="icon">⚠️</div><p>Could not load tips.<br><small style="opacity:0.7">${escHtml(e.message)}</small></p></div>`;
    }
  }

  async function saveTips() {
    const res = await fetch(BIN_URL, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': API_KEY
      },
      body: JSON.stringify(allTips)
    });
    if (!res.ok) {
      const txt = await res.text();
      throw new Error('HTTP ' + res.status + ': ' + txt);
    }
  }

  async function addTip() {
    const tipInput  = document.getElementById('tip-input');
    const nameInput = document.getElementById('name-input');
    const tag       = document.getElementById('tag-select').value;
    const text      = tipInput.value.trim();
    const author    = nameInput.value.trim() || 'anon';
    if (!text) { tipInput.focus(); return; }

    addBtn.disabled = true;
    setStatus('loading', 'saving...');
    try {
      allTips.unshift({ id: Date.now(), text, tag, author });
      await saveTips();
      tipInput.value = '';
      setStatus('ok', 'saved ✓');
      render();
    } catch(e) {
      console.error('addTip error:', e);
      allTips.shift();
      setStatus('error', 'could not save — ' + e.message);
    }
    addBtn.disabled = false;
  }

  async function deleteTip(id) {
    if (!confirm('Delete this tip?')) return;
    const prev = [...allTips];
    allTips = allTips.filter(t => t.id !== id);
    render();
    setStatus('loading', 'deleting...');
    try {
      await saveTips();
      setStatus('ok', 'deleted ✓');
    } catch(e) {
      console.error('deleteTip error:', e);
      allTips = prev;
      setStatus('error', 'could not delete — ' + e.message);
      render();
    }
  }

  function setFilter(tag) { activeFilter = tag; render(); }

  function render() {
    const filtered = activeFilter === 'all' ? allTips : allTips.filter(t => t.tag === activeFilter);
    const counts   = {};
    allTips.forEach(t => counts[t.tag] = (counts[t.tag] || 0) + 1);

    const availTags = Object.keys(TAG_CONFIG).filter(k => counts[k]);
    document.getElementById('filter-bar').innerHTML = ['all', ...availTags].map(tag => {
      const isAll  = tag === 'all';
      const label  = isAll ? `All (${allTips.length})` : `${TAG_CONFIG[tag].label} (${counts[tag]})`;
      const active = activeFilter === tag ? ' active' : '';
      return `<button class="filter-btn${active}" onclick="setFilter('${tag}')">${label}</button>`;
    }).join('');

    document.getElementById('count-label').textContent =
      filtered.length ? `${filtered.length} tip${filtered.length !== 1 ? 's' : ''}` : '';

    const grid = document.getElementById('tips-grid');
    if (!filtered.length) {
      grid.innerHTML = `<div class="state-msg"><div class="icon">✦</div><p>${allTips.length ? 'No tips in this category yet.' : 'No tips yet — drop the first one!'}</p></div>`;
      return;
    }
    grid.innerHTML = filtered.map(t => {
      const cfg = TAG_CONFIG[t.tag] || TAG_CONFIG.random;
      return `
        <article class="tip-card" style="--card-accent:${cfg.accent}">
          <span class="tip-tag" style="background:${cfg.bg};color:${cfg.color}">${cfg.label}</span>
          <p class="tip-text">${escHtml(t.text)}</p>
          <div class="tip-footer">
            <span class="tip-author">${escHtml(t.author)}</span>
            <button class="del-btn" onclick="deleteTip(${t.id})" title="Delete">✕ delete</button>
          </div>
        </article>`;
    }).join('');
  }

  document.getElementById('tip-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTip(); });

  loadTips();
</script>
</body>
</html>
