<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login ✦ tips & stuff</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#fdf0e4;--surface:#fff9f4;
      --text:#1a1208;--muted:#9a7a5a;
      --border:rgba(60,30,10,0.14);--border-strong:rgba(60,30,10,0.24);
      --accent:#c8602a;
    }
    html{font-size:16px}
    body{
      font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:2rem 1.25rem;
      background-image:
        radial-gradient(ellipse at 20% 10%,rgba(255,180,80,0.18) 0%,transparent 55%),
        radial-gradient(ellipse at 80% 90%,rgba(200,96,42,0.12) 0%,transparent 50%);
    }
    body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");background-size:200px 200px}

    .card{position:relative;z-index:1;width:100%;max-width:460px;background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:2.25rem 2.25rem 2rem;box-shadow:0 6px 40px rgba(180,80,20,0.10)}

    /* LOGO */
    .logo{font-family:'Instrument Serif',serif;font-size:1.75rem;letter-spacing:-0.02em;margin-bottom:1.5rem;color:var(--text)}
    .logo em{font-style:italic;color:var(--accent)}

    /* TABS */
    .tabs{display:flex;gap:0;border:1.5px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:1.5rem}
    .tab{flex:1;padding:0.6rem;font-family:'DM Sans',sans-serif;font-size:0.85rem;font-weight:500;background:transparent;border:none;cursor:pointer;color:var(--muted);transition:all 0.15s}
    .tab.active{background:var(--text);color:#fff}

    /* FIELDS */
    .field{margin-bottom:1.1rem}
    .field label{display:block;font-family:'DM Mono',monospace;font-size:0.7rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:0.45rem}
    .field input{width:100%;height:42px;padding:0 14px;font-family:'DM Sans',sans-serif;font-size:0.9rem;background:var(--bg);border:1.5px solid var(--border-strong);border-radius:9px;color:var(--text);outline:none;transition:border-color 0.15s}
    .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,96,42,0.1)}
    .field input::placeholder{color:#d4b090}

    /* HINT */
    .field-hint{font-size:0.72rem;color:var(--muted);margin-top:4px}

    /* ERROR / SUCCESS */
    .banner{display:none;font-size:0.82rem;padding:0.7rem 1rem;border-radius:8px;margin-bottom:1rem}
    .banner.show{display:block}
    .banner.error{background:#fff0ee;border:1px solid #e5a09a;color:#c0392b}
    .banner.success{background:#e8f5e9;border:1px solid #a5d6a7;color:#2d7a2d}

    /* BTN */
    .btn-main{width:100%;height:44px;font-family:'DM Sans',sans-serif;font-size:0.92rem;font-weight:500;background:var(--accent);color:#fff;border:none;border-radius:10px;cursor:pointer;transition:background 0.15s;margin-top:0.25rem}
    .btn-main:hover{background:#b5521f}
    .btn-main:disabled{background:#ccc;cursor:not-allowed}
    .btn-main.secondary{background:var(--text)}
    .btn-main.secondary:hover{opacity:0.82}

    /* DIVIDER */
    .or{display:flex;align-items:center;gap:10px;color:var(--muted);font-family:'DM Mono',monospace;font-size:0.7rem;margin:1.4rem 0}
    .or::before,.or::after{content:'';flex:1;height:1px;background:var(--border)}

    /* RANK SELECTOR */
    .rank-opts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1rem}
    .rank-opt{flex:1;min-width:80px;border:1.5px solid var(--border-strong);background:transparent;font-family:'DM Mono',monospace;font-size:0.74rem;padding:0.5rem 0.5rem;cursor:pointer;transition:all 0.13s;text-align:center;border-radius:8px;color:var(--muted)}
    .rank-opt:hover{border-color:var(--text);color:var(--text)}
    .rank-opt.selected{border-color:var(--accent);background:var(--accent);color:#fff}

    .note{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);text-align:center;margin-top:1rem;line-height:1.6}

    /* LOADING SPINNER */
    .spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-right:6px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="card">

  <div class="logo">tips <em>&</em> stuff</div>

  <!-- BANNER -->
  <div class="banner" id="banner"></div>

  <!-- PUBLIC TABS: Sign In / Register -->
  <div class="tabs">
    <button class="tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
    <button class="tab"        id="tab-register" onclick="switchTab('register')">Create Account</button>
  </div>

  <!-- SIGN IN FORM -->
  <div id="form-signin">
    <div class="field">
      <label>Username</label>
      <input type="text" id="si-user" placeholder="your username" autocomplete="username" maxlength="30"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="si-pass" placeholder="••••••••" autocomplete="current-password"/>
    </div>
    <button class="btn-main" id="si-btn" onclick="doSignIn()">Sign In</button>
  </div>

  <!-- REGISTER FORM -->
  <div id="form-register" style="display:none">
    <div class="field">
      <label>Username</label>
      <input type="text" id="reg-user" placeholder="choose a username" autocomplete="username" maxlength="30"/>
      <div class="field-hint">3–30 characters. Letters, numbers, underscores only.</div>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="reg-pass" placeholder="choose a password" autocomplete="new-password" maxlength="50"/>
      <div class="field-hint">At least 4 characters.</div>
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="reg-pass2" placeholder="repeat your password" autocomplete="new-password" maxlength="50"/>
    </div>
    <button class="btn-main" id="reg-btn" onclick="doRegister()">Create Account</button>
  </div>

  <!-- STAFF LOGIN -->
  <div class="or">staff login</div>

  <div class="rank-opts">
    <button class="rank-opt selected" data-rank="owner"  onclick="selectRank(this)">👑 Owner</button>
    <button class="rank-opt"          data-rank="admin"  onclick="selectRank(this)">🛡️ Admin</button>
    <button class="rank-opt"          data-rank="mod"    onclick="selectRank(this)">🔧 Mod</button>
  </div>
  <div class="field">
    <label>Staff Password</label>
    <input type="password" id="staff-pass" placeholder="••••••••" autocomplete="off"/>
  </div>
  <button class="btn-main secondary" onclick="doStaffLogin()">Login as Staff →</button>

  <p class="note">Public accounts are for the community.<br/>Staff ranks require a password from the Owner.</p>
</div>

<script>
  // ── Skip if already logged in as staff ──
  const ex = sessionStorage.getItem('rank');
  // Only skip login page if already logged in as STAFF (not public)
  // If they're public, clear it so the login page shows correctly
  if(ex && ex !== 'public') {
    window.location.replace('index.html');
  } else if(ex === 'public') {
    // They came here intentionally (clicked Login) — let them see the page
    // Don't redirect back
  }

  const BIN_ID  = '6a25d3bcf5f4af5e29c7e9a1';
  const API_KEY = '$2a$10$g2w/Ji/OAOdsFUPYJt3SNOrEKqe74g.CKnZ2s7tIJpVFpezCM3UjO';
  const BIN_URL = 'https://api.jsonbin.io/v3/b/' + BIN_ID;
  let PASSWORDS = { owner:'20140314', admin:'382790', mod:'23889' };
  let dbCache   = null;
  let selectedRank = 'owner';

  // Load db once on page load
  async function getDB() {
    if(dbCache) return dbCache;
    const res  = await fetch(BIN_URL+'/latest',{headers:{'X-Master-Key':API_KEY,'X-Bin-Meta':'false'}});
    const raw  = await res.json();
    dbCache    = raw.record !== undefined ? raw.record : raw;
    if(!Array.isArray(dbCache.accounts)) dbCache.accounts = [];
    // Load custom passwords if set
    if(dbCache.config && dbCache.config.passwords) {
      if(dbCache.config.passwords.owner) PASSWORDS.owner = dbCache.config.passwords.owner;
      if(dbCache.config.passwords.admin) PASSWORDS.admin = dbCache.config.passwords.admin;
      if(dbCache.config.passwords.mod)   PASSWORDS.mod   = dbCache.config.passwords.mod;
    }
    return dbCache;
  }

  async function saveDB(db) {
    await fetch(BIN_URL,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':API_KEY},body:JSON.stringify(db)});
  }

  // ── UI ──
  function switchTab(t) {
    document.getElementById('tab-signin').classList.toggle('active',   t==='signin');
    document.getElementById('tab-register').classList.toggle('active', t==='register');
    document.getElementById('form-signin').style.display   = t==='signin'   ? 'block' : 'none';
    document.getElementById('form-register').style.display = t==='register' ? 'block' : 'none';
    hideBanner();
  }

  function showBanner(msg, type='error') {
    const b = document.getElementById('banner');
    b.textContent = msg; b.className = 'banner show ' + type;
  }
  function hideBanner() {
    document.getElementById('banner').className = 'banner';
  }

  function setLoading(btnId, loading) {
    const btn = document.getElementById(btnId);
    btn.disabled = loading;
    btn.innerHTML = loading ? '<span class="spin"></span>Please wait…' : btn.dataset.label;
  }

  // Store original labels
  document.getElementById('si-btn').dataset.label  = 'Sign In';
  document.getElementById('reg-btn').dataset.label = 'Create Account';

  function selectRank(el) {
    document.querySelectorAll('.rank-opt').forEach(b=>b.classList.remove('selected'));
    el.classList.add('selected');
    selectedRank = el.dataset.rank;
  }

  // ── SIGN IN ──
  async function doSignIn() {
    const user = document.getElementById('si-user').value.trim();
    const pass = document.getElementById('si-pass').value;
    if(!user || !pass) { showBanner('Please fill in both fields.'); return; }
    setLoading('si-btn', true);
    try {
      const db = await getDB();
      const account = db.accounts.find(a => a.username.toLowerCase() === user.toLowerCase());
      if(!account) { showBanner('No account found with that username.'); return; }
      if(account.password !== pass) { showBanner('Incorrect password.'); return; }
      // Success
      sessionStorage.setItem('rank', 'public');
      sessionStorage.setItem('username', account.username);
      window.location.replace('index.html');
    } catch(e) {
      showBanner('Could not connect. Try again.');
    } finally {
      setLoading('si-btn', false);
    }
  }

  // ── REGISTER ──
  async function doRegister() {
    const user  = document.getElementById('reg-user').value.trim();
    const pass  = document.getElementById('reg-pass').value;
    const pass2 = document.getElementById('reg-pass2').value;
    // Validate
    if(!user || !pass) { showBanner('Please fill in all fields.'); return; }
    if(!/^[a-zA-Z0-9_]{3,30}$/.test(user)) { showBanner('Username must be 3–30 characters: letters, numbers, underscores only.'); return; }
    if(pass.length < 4) { showBanner('Password must be at least 4 characters.'); return; }
    if(pass !== pass2)  { showBanner('Passwords do not match.'); return; }
    setLoading('reg-btn', true);
    try {
      const db = await getDB();
      // Check duplicate
      if(db.accounts.find(a => a.username.toLowerCase() === user.toLowerCase())) {
        showBanner('That username is already taken. Choose another.'); return;
      }
      // Save new account
      db.accounts.push({ id: Date.now(), username: user, password: pass, joined: Date.now() });
      await saveDB(db);
      // Auto-login
      sessionStorage.setItem('rank', 'public');
      sessionStorage.setItem('username', user);
      showBanner('Account created! Taking you in…', 'success');
      setTimeout(() => window.location.replace('index.html'), 800);
    } catch(e) {
      showBanner('Could not create account. Try again.');
    } finally {
      setLoading('reg-btn', false);
    }
  }

  // ── STAFF LOGIN ──
  function doStaffLogin() {
    const pass = document.getElementById('staff-pass').value;
    if(pass === PASSWORDS[selectedRank]) {
      sessionStorage.setItem('rank', selectedRank);
      sessionStorage.removeItem('username');
      window.location.replace('index.html');
    } else {
      showBanner('Incorrect staff password.');
    }
  }

  // ── KEYBOARD ──
  document.getElementById('si-pass').addEventListener('keydown',   e=>{ if(e.key==='Enter') doSignIn(); });
  document.getElementById('si-user').addEventListener('keydown',   e=>{ if(e.key==='Enter') doSignIn(); });
  document.getElementById('reg-pass2').addEventListener('keydown', e=>{ if(e.key==='Enter') doRegister(); });
  document.getElementById('staff-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') doStaffLogin(); });

  // Pre-load db silently
  getDB().catch(()=>{});
</script>
<script src="transition.js"></script>
</body>
</html>
