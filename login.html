<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login ✦ tips & stuff</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fdf0e4;
      --bg2: #fae3cc;
      --text: #1a1208;
      --muted: #9a7a5a;
      --border: #1a1208;
      --accent: #c8602a;
      --surface: #fff9f4;
      --error-bg: #fff0ee;
      --error-border: #e5a09a;
      --error-txt: #c0392b;
    }
    html { font-size: 16px; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
      /* subtle warm texture */
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(255,180,80,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 90%, rgba(200,96,42,0.12) 0%, transparent 50%);
    }
 
    .login-wrap {
      width: 100%;
      max-width: 500px;
      background: var(--surface);
      border: 1.5px solid rgba(60,30,10,0.14);
      border-radius: 16px;
      padding: 3rem 3rem 2.5rem;
      box-shadow: 0 4px 32px rgba(180,80,20,0.10), 0 1px 4px rgba(0,0,0,0.06);
    }
 
    /* HEADER */
    .login-header { margin-bottom: 2rem; }
    .login-logo {
      font-family: 'Instrument Serif', serif;
      font-size: 1.9rem;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 6px;
    }
    .login-logo em { font-style: italic; color: var(--accent); }
    .login-eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
 
    /* ERROR BANNER */
    .error-banner {
      display: none;
      border: 1px solid var(--error-border);
      background: var(--error-bg);
      color: var(--error-txt);
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      padding: 0.85rem 1rem;
      margin-bottom: 1.5rem;
      border-radius: 8px;
    }
    .error-banner.show { display: block; }
 
    /* PUBLIC ENTRY */
    .public-entry {
      background: var(--bg);
      border: 1.5px solid rgba(60,30,10,0.12);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 1.75rem;
      flex-wrap: wrap;
    }
    .public-entry-text { flex: 1; min-width: 160px; }
    .public-entry-text strong { font-size: 0.9rem; font-weight: 500; display: block; margin-bottom: 2px; }
    .public-entry-text span { font-size: 0.78rem; color: var(--muted); }
    .public-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.55rem 1.2rem;
      background: var(--text);
      color: #fff;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      transition: opacity 0.13s;
      white-space: nowrap;
    }
    .public-btn:hover { opacity: 0.82; }
 
    /* OR DIVIDER */
    .or-divider {
      display: flex; align-items: center; gap: 1rem;
      color: var(--muted); font-family: 'DM Mono', monospace;
      font-size: 0.72rem; margin-bottom: 1.75rem;
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; height: 1px; background: rgba(60,30,10,0.14);
    }
 
    /* FIELDS */
    .field { margin-bottom: 1.75rem; }
    .field label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }
    .field input {
      width: 100%;
      border: none;
      border-bottom: 1.5px solid rgba(60,30,10,0.25);
      background: transparent;
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      color: var(--text);
      padding: 0.4rem 0 0.65rem;
      outline: none;
      transition: border-color 0.15s;
      border-radius: 0;
    }
    .field input:focus { border-bottom-color: var(--accent); }
    .field input::placeholder { color: #d4b090; }
 
    /* RANK SELECTOR */
    .rank-selector { margin-bottom: 1.75rem; }
    .rank-selector label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }
    .rank-options { display: flex; gap: 8px; flex-wrap: wrap; }
    .rank-opt {
      flex: 1; min-width: 90px;
      border: 1.5px solid rgba(60,30,10,0.18);
      background: transparent;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      padding: 0.55rem 0.6rem;
      cursor: pointer;
      transition: all 0.13s;
      text-align: center;
      border-radius: 8px;
      color: var(--muted);
    }
    .rank-opt:hover { border-color: var(--text); color: var(--text); }
    .rank-opt.selected { border-color: var(--accent); background: var(--accent); color: #fff; }
 
    /* CONTINUE BTN */
    .continue-btn {
      width: 100%;
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.85rem 2rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.13s, transform 0.1s;
      margin-bottom: 1.5rem;
    }
    .continue-btn:hover { background: #b5521f; }
    .continue-btn:active { transform: scale(0.98); }
 
    .site-note {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }
 
    @media (max-width: 560px) {
      .login-wrap { padding: 2rem 1.5rem 2rem; }
    }
  </style>
</head>
<body>
<div class="login-wrap">
 
  <div class="login-header">
    <div class="login-logo">tips <em>&</em> stuff</div>
    <div class="login-eyebrow">Sign in to continue ✦</div>
  </div>
 
  <div class="error-banner" id="error-banner">Incorrect password. Please try again.</div>
 
  <!-- PUBLIC ENTRY -->
  <div class="public-entry">
    <div class="public-entry-text">
      <strong>👤 Continue as Public</strong>
      <span>Browse tips without a staff account</span>
    </div>
    <button class="public-btn" onclick="goPublic()">Enter →</button>
  </div>
 
  <div class="or-divider">staff login</div>
 
  <!-- NAME -->
  <div class="field">
    <label>Name</label>
    <input type="text" id="login-name" placeholder="your name" autocomplete="off" />
  </div>
 
  <!-- PASSWORD -->
  <div class="field">
    <label>Password</label>
    <input type="password" id="login-pw" placeholder="••••••••" />
  </div>
 
  <!-- RANK SELECTOR -->
  <div class="rank-selector">
    <label>Login as</label>
    <div class="rank-options">
      <button class="rank-opt selected" data-rank="owner" onclick="selectRank(this)">👑 Owner</button>
      <button class="rank-opt"          data-rank="admin" onclick="selectRank(this)">🛡️ Admin</button>
      <button class="rank-opt"          data-rank="mod"   onclick="selectRank(this)">🔧 Mod</button>
    </div>
  </div>
 
  <button class="continue-btn" onclick="doLogin()">Continue as Staff →</button>
 
  <p class="site-note">This site uses password-based staff ranks.<br/>Public visitors can enter freely without a password.</p>
 
</div>
 
<script>
  // If already logged in, skip login page
  const existingRank = sessionStorage.getItem('rank');
  // Only auto-skip if already logged in as staff (not public)
  if (existingRank && existingRank !== 'public') window.location.replace('index.html');
 
  const PASSWORDS = { owner: '20140314', admin: '382790', mod: '23889' };
  let selectedRank = 'owner';
 
  // Load updated passwords from JSONBin
  const BIN_ID  = '6a25d3bcf5f4af5e29c7e9a1';
  const API_KEY = '$2a$10$g2w/Ji/OAOdsFUPYJt3SNOrEKqe74g.CKnZ2s7tIJpVFpezCM3UjO';
  fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest', {
    headers: { 'X-Master-Key': API_KEY, 'X-Bin-Meta': 'false' }
  }).then(r => r.json()).then(raw => {
    const data = raw.record !== undefined ? raw.record : raw;
    if (data.config && data.config.passwords) {
      if (data.config.passwords.owner) PASSWORDS.owner = data.config.passwords.owner;
      if (data.config.passwords.admin) PASSWORDS.admin = data.config.passwords.admin;
      if (data.config.passwords.mod)   PASSWORDS.mod   = data.config.passwords.mod;
    }
  }).catch(() => {});
 
  function goPublic() {
    sessionStorage.setItem('rank', 'public');
    window.location.href = 'index.html';
  }
 
  function selectRank(el) {
    document.querySelectorAll('.rank-opt').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    selectedRank = el.dataset.rank;
  }
 
  function doLogin() {
    const pw = document.getElementById('login-pw').value;
    const banner = document.getElementById('error-banner');
    if (pw === PASSWORDS[selectedRank]) {
      sessionStorage.setItem('rank', selectedRank);
      window.location.href = 'index.html';
    } else {
      banner.textContent = 'Incorrect password. Please try again.';
      banner.classList.add('show');
      document.getElementById('login-pw').value = '';
      document.getElementById('login-pw').focus();
    }
  }
 
  document.getElementById('login-pw').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
