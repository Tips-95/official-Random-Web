<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login ✦ tips & stuff</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafaf8;
      --text: #111;
      --muted: #888;
      --border: #111;
      --accent: #c8602a;
      --error-bg: #fff0ee;
      --error-border: #e5a09a;
      --error-txt: #c0392b;
    }
    html { font-size: 16px; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 5rem 1.5rem;
    }

    .login-wrap { width: 100%; max-width: 580px; }

    /* TITLE */
    .login-title {
      font-family: 'DM Mono', monospace;
      font-size: 2rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 1.75rem;
    }

    /* ERROR BANNER */
    .error-banner {
      display: none;
      border: 1px solid var(--error-border);
      background: var(--error-bg);
      color: var(--error-txt);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      padding: 1rem 1.25rem;
      margin-bottom: 2rem;
      border-radius: 2px;
    }
    .error-banner.show { display: block; }

    /* FIELDS */
    .field { margin-bottom: 2.25rem; }
    .field label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 0.75rem;
    }
    .field input {
      width: 100%;
      border: none;
      border-bottom: 1.5px solid var(--border);
      background: transparent;
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      color: var(--text);
      padding: 0.5rem 0 0.75rem;
      outline: none;
      transition: border-color 0.15s;
      border-radius: 0;
    }
    .field input:focus { border-bottom-color: var(--accent); }
    .field input::placeholder { color: #ccc; }

    /* RANK SELECTOR */
    .rank-selector { margin-bottom: 2.25rem; }
    .rank-selector label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
    }
    .rank-options { display: flex; gap: 10px; flex-wrap: wrap; }
    .rank-opt {
      flex: 1; min-width: 100px;
      border: 1.5px solid #ddd;
      background: transparent;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      padding: 0.6rem 0.75rem;
      cursor: pointer;
      transition: all 0.13s;
      text-align: center;
      border-radius: 2px;
    }
    .rank-opt:hover { border-color: var(--text); }
    .rank-opt.selected { border-color: var(--text); background: var(--text); color: #fff; }

    /* BOTTOM ROW */
    .login-bottom {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .back-link {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px dashed var(--muted);
      padding-bottom: 1px;
      transition: color 0.13s;
    }
    .back-link:hover { color: var(--text); border-bottom-color: var(--text); }

    .continue-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      font-weight: 500;
      padding: 0.75rem 2rem;
      background: transparent;
      color: var(--text);
      border: 1.5px solid var(--text);
      cursor: pointer;
      transition: all 0.13s;
      border-radius: 2px;
      position: relative;
    }
    .continue-btn::after {
      content: '';
      position: absolute;
      bottom: -4px; right: -4px;
      width: 100%; height: 100%;
      border: 1.5px solid var(--text);
      border-radius: 2px;
      transition: all 0.13s;
    }
    .continue-btn:hover { background: var(--text); color: #fff; }
    .continue-btn:hover::after { bottom: -6px; right: -6px; }

    /* DIVIDER */
    .or-divider {
      display: flex; align-items: center; gap: 1rem;
      color: var(--muted); font-family: 'DM Mono', monospace;
      font-size: 0.78rem; margin-bottom: 2rem;
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; height: 1px; background: #ddd;
    }

    /* SOCIAL ICONS */
    .social-row { display: flex; gap: 12px; flex-wrap: wrap; }
    .social-btn {
      width: 68px; height: 68px;
      border: 1.5px solid #ccc;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.13s;
      font-size: 1.4rem; border-radius: 2px;
      position: relative;
    }
    .social-btn::after {
      content: '';
      position: absolute;
      bottom: -4px; right: -4px;
      width: 100%; height: 100%;
      border: 1.5px solid #ccc;
      border-radius: 2px;
      transition: all 0.13s;
    }
    .social-btn:hover { border-color: var(--text); }
    .social-btn:hover::after { border-color: var(--text); bottom: -6px; right: -6px; }

    .site-note {
      margin-top: 3rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
      text-align: center;
    }
  </style>
</head>
<body>
<div class="login-wrap">

  <h1 class="login-title">Login</h1>

  <div class="error-banner" id="error-banner">Incorrect password. Please try again.</div>

  <div class="field">
    <label>Email / Username</label>
    <input type="text" id="login-name" placeholder="your name or email" autocomplete="off" />
  </div>

  <div class="field">
    <label>Password</label>
    <input type="password" id="login-pw" placeholder="••••••••" />
  </div>

  <div class="rank-selector">
    <label>Login as</label>
    <div class="rank-options">
      <button class="rank-opt selected" data-rank="owner"  onclick="selectRank(this)">👑 Owner</button>
      <button class="rank-opt"          data-rank="admin"  onclick="selectRank(this)">🛡️ Admin</button>
      <button class="rank-opt"          data-rank="mod"    onclick="selectRank(this)">🔧 Mod</button>
    </div>
  </div>

  <div class="login-bottom">
    <a href="index.html" class="back-link">← Back to site</a>
    <button class="continue-btn" onclick="doLogin()">Continue</button>
  </div>

  <div class="or-divider">or sign in with</div>

  <div class="social-row">
    <button class="social-btn" title="Google" onclick="notSupported()">
      <svg width="22" height="22" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    </button>
    <button class="social-btn" title="GitHub" onclick="notSupported()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="#111"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
    </button>
    <button class="social-btn" title="Facebook" onclick="notSupported()">
      <svg width="22" height="22" viewBox="0 0 24 24"><path fill="#1877F2" d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
    </button>
    <button class="social-btn" title="Twitter / X" onclick="notSupported()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#1DA1F2"><path d="M23.953 4.57a10 10 0 01-2.825.775 4.958 4.958 0 002.163-2.723c-.951.555-2.005.959-3.127 1.184a4.92 4.92 0 00-8.384 4.482C7.69 8.095 4.067 6.13 1.64 3.162a4.822 4.822 0 00-.666 2.475c0 1.71.87 3.213 2.188 4.096a4.904 4.904 0 01-2.228-.616v.06a4.923 4.923 0 003.946 4.827 4.996 4.996 0 01-2.212.085 4.936 4.936 0 004.604 3.417 9.867 9.867 0 01-6.102 2.105c-.39 0-.779-.023-1.17-.067a13.995 13.995 0 007.557 2.209c9.053 0 13.998-7.496 13.998-13.985 0-.21 0-.42-.015-.63A9.935 9.935 0 0024 4.59z"/></svg>
    </button>
  </div>

  <p class="site-note">Social login is decorative only — this site uses password-based staff ranks.</p>
</div>

<script>
  const PASSWORDS = { owner: '20140314', admin: '382790', mod: '23889' };
  let selectedRank = 'owner';

  // Try to load passwords from JSONBin
  const BIN_ID  = '6a25d3bcf5f4af5e29c7e9a1';
  const API_KEY = '$2a$10$g2w/Ji/OAOdsFUPYJt3SNOrEKqe74g.CKnZ2s7tIJpVFpezCM3UjO';
  fetch('https://api.jsonbin.io/v3/b/' + BIN_ID + '/latest', { headers: { 'X-Master-Key': API_KEY, 'X-Bin-Meta': 'false' } })
    .then(r => r.json()).then(raw => {
      const data = raw.record !== undefined ? raw.record : raw;
      if (data.config && data.config.passwords) {
        if (data.config.passwords.owner) PASSWORDS.owner = data.config.passwords.owner;
        if (data.config.passwords.admin) PASSWORDS.admin = data.config.passwords.admin;
        if (data.config.passwords.mod)   PASSWORDS.mod   = data.config.passwords.mod;
      }
    }).catch(() => {});

  function selectRank(el) {
    document.querySelectorAll('.rank-opt').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    selectedRank = el.dataset.rank;
  }

  function doLogin() {
    const pw = document.getElementById('login-pw').value;
    const banner = document.getElementById('error-banner');
    if (pw === PASSWORDS[selectedRank]) {
      sessionStorage.setItem('rank', selectedRank);
      window.location.href = 'index.html';
    } else {
      banner.textContent = 'Incorrect password. Please try again.';
      banner.classList.add('show');
      document.getElementById('login-pw').value = '';
      document.getElementById('login-pw').focus();
    }
  }

  function notSupported() {
    const banner = document.getElementById('error-banner');
    banner.textContent = 'Social login is not supported — please use your staff password above.';
    banner.classList.add('show');
  }

  document.getElementById('login-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
