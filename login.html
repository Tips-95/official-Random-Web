<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login ✦ tips & stuff</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f5f2eb;--surface:#fffdf8;
      --border:rgba(60,50,30,0.12);--border-strong:rgba(60,50,30,0.22);
      --text:#1a1612;--muted:#7a7060;--accent:#c8602a;
      --owner-bg:#1a1612;--owner-txt:#f0c060;
      --admin-bg:#2a1a4a;--admin-txt:#c090ff;
      --mod-bg:#0a2a1a;--mod-txt:#60d090;
    }
    html,body{height:100%}
    body{
      font-family:'DM Sans',sans-serif;background:var(--bg);
      color:var(--text);display:flex;flex-direction:column;
      align-items:center;justify-content:center;min-height:100vh;
      padding:1.5rem;
    }
    body::before{
      content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      background-size:200px 200px;
    }

    /* CARD */
    .login-card{
      position:relative;z-index:1;
      background:var(--surface);border:1px solid var(--border);
      border-radius:18px;padding:2.25rem 2rem;
      width:100%;max-width:400px;
      box-shadow:0 8px 32px rgba(0,0,0,0.08);
      animation:rise 0.3s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

    /* LOGO */
    .login-logo{
      font-family:'Instrument Serif',serif;font-size:1.6rem;
      letter-spacing:-0.02em;text-align:center;margin-bottom:0.25rem;
    }
    .login-logo em{font-style:italic;color:var(--accent)}
    .login-sub{text-align:center;font-size:0.8rem;color:var(--muted);margin-bottom:1.75rem}

    /* RANK PILLS */
    .rank-picker{display:flex;gap:6px;margin-bottom:1.25rem}
    .rank-pill{
      flex:1;height:38px;border-radius:8px;border:1.5px solid var(--border-strong);
      background:transparent;font-family:'DM Sans',sans-serif;font-size:0.78rem;
      font-weight:500;color:var(--muted);cursor:pointer;transition:all 0.15s;
      display:flex;align-items:center;justify-content:center;gap:4px;
    }
    .rank-pill:hover{border-color:var(--accent);color:var(--text)}
    .rank-pill.selected-owner{background:var(--owner-bg);color:var(--owner-txt);border-color:var(--owner-bg)}
    .rank-pill.selected-admin{background:var(--admin-bg);color:var(--admin-txt);border-color:var(--admin-bg)}
    .rank-pill.selected-mod{background:var(--mod-bg);color:var(--mod-txt);border-color:var(--mod-bg)}

    /* FIELDS */
    .field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
    .field label{font-size:0.72rem;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
    .field input{
      height:44px;padding:0 14px;font-family:'DM Sans',sans-serif;font-size:0.9rem;
      background:var(--bg);border:1.5px solid var(--border-strong);border-radius:10px;
      color:var(--text);outline:none;transition:border-color 0.15s,box-shadow 0.15s;width:100%;
    }
    .field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(200,96,42,0.12)}
    .field input::placeholder{color:var(--muted)}

    /* ERROR */
    .error-msg{
      display:none;font-size:0.8rem;color:#c0392b;
      background:#fce8ec;border:1px solid #ef9a9a;
      border-radius:8px;padding:8px 12px;margin-bottom:12px;
      text-align:center;
    }
    .error-msg.show{display:block}

    /* LOGIN BTN */
    .login-btn{
      width:100%;height:46px;font-family:'DM Sans',sans-serif;font-size:0.95rem;
      font-weight:500;background:var(--accent);color:#fff;border:none;
      border-radius:10px;cursor:pointer;transition:background 0.15s,transform 0.1s;
      margin-top:4px;
    }
    .login-btn:hover{background:#b5521f}
    .login-btn:active{transform:scale(0.98)}
    .login-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}

    /* DIVIDER */
    .divider{border:none;border-top:1px solid var(--border);margin:1.25rem 0}

    /* HINT */
    .login-hint{font-size:0.75rem;color:var(--muted);text-align:center;line-height:1.5}
    .login-hint a{color:var(--accent);text-decoration:none}
    .login-hint a:hover{text-decoration:underline}

    /* SUCCESS FLASH */
    .success-overlay{
      position:fixed;inset:0;z-index:9999;background:var(--bg);
      display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;
    }
    .success-overlay.show{display:flex}
    .success-logo{font-family:'Instrument Serif',serif;font-size:2rem;letter-spacing:-0.02em}
    .success-logo em{font-style:italic;color:var(--accent)}
    .success-msg{font-size:0.82rem;color:var(--muted);font-family:'DM Mono',monospace}
  </style>
</head>
<body>

<!-- Success screen shown briefly before redirect -->
<div class="success-overlay" id="success-overlay">
  <div class="success-logo">tips <em>&</em> stuff</div>
  <div class="success-msg" id="success-msg">Welcome back!</div>
</div>

<div class="login-card">
  <div class="login-logo">tips <em>&</em> stuff</div>
  <p class="login-sub">sign in to your account</p>

  <!-- RANK SELECTOR -->
  <div class="rank-picker">
    <button class="rank-pill" id="pill-owner" onclick="selectRank('owner')">👑 Owner</button>
    <button class="rank-pill" id="pill-admin" onclick="selectRank('admin')">🛡️ Admin</button>
    <button class="rank-pill" id="pill-mod"   onclick="selectRank('mod')">🔧 Mod</button>
  </div>

  <!-- USERNAME -->
  <div class="field">
    <label>Your Display Name</label>
    <input type="text" id="inp-username" placeholder="Name shown in chat & posts" maxlength="30" autocomplete="nickname"/>
  </div>

  <!-- PASSWORD -->
  <div class="field">
    <label>Password</label>
    <input type="password" id="inp-password" placeholder="Enter your rank password" maxlength="60" autocomplete="current-password"/>
  </div>

  <!-- ERROR -->
  <div class="error-msg" id="error-msg">Incorrect password. Try again.</div>

  <!-- SUBMIT -->
  <button class="login-btn" id="login-btn" onclick="doLogin()">Sign In →</button>

  <hr class="divider"/>
  <p class="login-hint">
    <a href="index.html">← Back to site</a> &nbsp;·&nbsp;
    Need the password? Ask the owner.
  </p>
</div>

<script>
// ── If already logged in, skip straight to the site ──
(function(){
  var r = localStorage.getItem('rank');
  // Only skip if they have a non-public rank already saved
  if(r && r !== 'public' && r !== 'null' && r !== 'undefined') {
    window.location.replace('index.html');
  }
})();

// ── Passwords (will be overridden by JSONBin config) ──
const PASSWORDS = { owner:'20140314', admin:'382790', mod:'23889' };
const BIN_ID  = '6a25d3bcf5f4af5e29c7e9a1';
const API_KEY = '$2a$10$g2w/Ji/OAOdsFUPYJt3SNOrEKqe74g.CKnZ2s7tIJpVFpezCM3UjO';

let selectedRank = null;

// Try to load passwords from JSONBin in the background
(async function(){
  try{
    const res = await fetch('https://api.jsonbin.io/v3/b/'+BIN_ID+'/latest',{
      headers:{'X-Master-Key':API_KEY,'X-Bin-Meta':'false'}
    });
    if(!res.ok) return;
    const raw  = await res.json();
    const data = raw.record !== undefined ? raw.record : raw;
    if(data.config && data.config.passwords){
      const p = data.config.passwords;
      if(p.owner) PASSWORDS.owner = p.owner;
      if(p.admin) PASSWORDS.admin = p.admin;
      if(p.mod)   PASSWORDS.mod   = p.mod;
    }
  }catch(e){}
})();

function selectRank(r){
  selectedRank = r;
  // Reset all pills
  ['owner','admin','mod'].forEach(k=>{
    document.getElementById('pill-'+k).className = 'rank-pill';
  });
  // Highlight selected
  document.getElementById('pill-'+r).className = 'rank-pill selected-'+r;
  // Focus password field
  document.getElementById('inp-password').focus();
}

function doLogin(){
  const username = document.getElementById('inp-username').value.trim();
  const password = document.getElementById('inp-password').value;
  const errEl    = document.getElementById('error-msg');
  const btn      = document.getElementById('login-btn');

  // Validation
  errEl.classList.remove('show');

  if(!selectedRank){
    errEl.textContent = 'Please select your rank first.';
    errEl.classList.add('show');
    return;
  }
  if(!username){
    errEl.textContent = 'Please enter your display name.';
    errEl.classList.add('show');
    document.getElementById('inp-username').focus();
    return;
  }
  if(!password){
    errEl.textContent = 'Please enter your password.';
    errEl.classList.add('show');
    document.getElementById('inp-password').focus();
    return;
  }

  // Check password
  if(password !== PASSWORDS[selectedRank]){
    errEl.textContent = 'Incorrect password. Try again.';
    errEl.classList.add('show');
    document.getElementById('inp-password').value = '';
    document.getElementById('inp-password').focus();
    return;
  }

  // ✅ Success — save to localStorage
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  localStorage.setItem('rank', selectedRank);
  localStorage.setItem('username', username);

  // Show success overlay briefly, then redirect
  const rankLabels = {owner:'👑 Owner', admin:'🛡️ Admin', mod:'🔧 Mod'};
  document.getElementById('success-msg').textContent =
    'Welcome, ' + username + '! (' + rankLabels[selectedRank] + ')';
  document.getElementById('success-overlay').classList.add('show');

  setTimeout(()=>{
    window.location.replace('index.html');
  }, 800);
}

// Allow Enter key to submit
document.addEventListener('keydown', e=>{
  if(e.key === 'Enter') doLogin();
});

// Pre-select rank from localStorage if returning
(function(){
  const saved = localStorage.getItem('rank');
  const validRanks = ['owner','admin','mod'];
  if(saved && validRanks.includes(saved)) selectRank(saved);
  // Pre-fill username
  const savedName = localStorage.getItem('username');
  if(savedName) document.getElementById('inp-username').value = savedName;
})();
</script>
</body>
</html>
